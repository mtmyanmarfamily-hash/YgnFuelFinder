apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply plugin: 'com.google.gms.google-services'

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new GradleException("Flutter SDK not found.")
}

apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

android {
    namespace "com.ygnfuel.app"
    compileSdkVersion 34
    ndkVersion "25.1.8937393"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    // 🔥 အရေးကြီးဆုံးအပိုင်း- သင်တင်ထားသော debug.keystore ကို အမြဲသုံးရန် သတ်မှတ်ခြင်း
    signingConfigs {
        debug {
            // debug.keystore ဖိုင်သည် android/app/ folder ထဲတွင် ရှိနေရပါမည်
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    defaultConfig {
        applicationId "com.ygnfuel.app"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 3 // Version တိုးပေးခြင်းဖြင့် cache ရှင်းလင်းပါသည်
        versionName "1.0.2"
        multiDexEnabled true
    }

    buildTypes {
        release {
            // Release build တွင်လည်း သင်၏ debug key ကို အတင်းသုံးခိုင်းခြင်း
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
        debug {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.0"
    implementation 'com.android.support:multidex:1.0.3'
}

